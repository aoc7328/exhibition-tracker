name: Update Exhibitions

# 重要:本 workflow 故意不寫 schedule(已知 GitHub Actions schedule 在低活動倉庫不可靠)
# 排程觸發改由 Make.com 透過 GitHub API workflow_dispatch
on:
  workflow_dispatch:
    inputs:
      year:
        description: 目標年份(空白則用當年)
        required: false
        default: ""

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 一條龍:Layer1 爬蟲 + 財報 + 法說會(MOPS) + 總經(M平方) + Layer2(Perplexity) + 產 .ics
      # 與本機 run_all_in_one.bat 完全同一支程式、同一組參數,確保行為一致。
      - name: Run full pipeline (update_all, Perplexity engine)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.year }}" ]; then
            python scripts/update_all.py --lean --no-validate --years "${{ github.event.inputs.year }}"
          else
            python scripts/update_all.py --lean --no-validate
          fi

      - name: Deploy .ics to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: false
          commit_message: "Update exhibitions.ics"
