# 精簡版 — 給 Claude Pro $20 訂閱用,每月一次可跑完不太撞牆
#
# 包含:
#   1. 臺灣專屬(同完整版):文具/建材/旅展
#   2. 世界各類別大型盛會(每類 1-2 個)
#   3. MAG7 + 重要 AI/科技龍頭年度發表會

industries:
  # ============================================================
  # 世界各類別大型盛會(每類 1-2 個)
  # ============================================================
  - name: 半導體
    keywords: [SEMICON, semiconductor, 半導體, 晶圓]
    known_exhibitions:
      - SEMICON Taiwan
      - SEMICON West

  - name: 顯示與面板
    keywords: [Display, OLED, Micro LED, 顯示器, 面板]
    known_exhibitions:
      - Display Week SID
      - Touch Taiwan

  - name: 通訊與5G
    keywords: [MWC, 5G, 6G, mobile world]
    known_exhibitions:
      - MWC Barcelona

  - name: 衛星與太空
    keywords: [satellite, space, 衛星, 太空]
    known_exhibitions:
      - Satellite Show DC
      - Space Symposium

  - name: 機器人
    keywords: [robotics, humanoid, 機器人]
    known_exhibitions:
      - iREX 國際機器人展
      - 台灣機器人與智慧自動化展

  - name: 國防與無人系統
    keywords: [defense, drone, 國防, 無人機]
    known_exhibitions:
      - Eurosatory
      - 台北國際國防航太暨無人機展

  - name: 車用電子
    keywords: [automotive, EV, 車用電子]
    known_exhibitions:
      - Electronica

  - name: 消費電子綜合
    keywords: [CES, IFA, consumer electronics]
    known_exhibitions:
      - CES Las Vegas
      - IFA Berlin
      # Computex Taipei 已移到「科技盛事」類別(桃紅)

  # ============================================================
  # 科技盛事 — 超大型科技公司發表盛事 / 開發者大會(桃紅標記)
  # 與「企業」(財報/法說會/月營收)刻意區隔:這裡是「產品與技術發表」的旗艦活動。
  # NVIDIA GTC 各地區分開列 —— unique key 是「展名 + 年份」,同年同名只會留一筆,
  # 所以不分開的話 6 月的 GTC Taipei 會被 3 月的 GTC San Jose 蓋掉(比照下方 Code with Claude 三城市拆法)。
  # ============================================================
  - name: 科技盛事
    keywords: [keynote, developer conference, launch event, Unpacked, 發表會, WWDC, GTC, I/O]
    known_exhibitions:
      - Apple WWDC
      - Apple iPhone Event September
      - Apple Mac Event
      - Google I/O
      - Google Pixel Event
      - Google Cloud Next
      - NVIDIA GTC San Jose
      - NVIDIA GTC Taipei
      - NVIDIA GTC Washington DC
      - AMD Advancing AI Event
      - Microsoft Build
      - Microsoft Ignite
      - Meta Connect
      - AWS re:Invent
      - OpenAI DevDay
      - Oracle CloudWorld
      - Samsung Galaxy Unpacked
      - Qualcomm Snapdragon Summit
      - Computex Taipei
      - Tesla AI Day
      - SpaceX Starship Update
      # Anthropic 巡迴系列 (Code with Claude),三場獨立列出避免把日期合併
      - Code with Claude SF
      - Code with Claude London
      - Code with Claude Tokyo

  # ============================================================
  # 企業 — 純財務事件(財報 / 法說會 / 月營收 / 投資人會議,紫色標記)
  # 注意:
  # - 美股 quarterly earnings 由 Finnhub API scraper 抓
  # - 台股月營收由 src/scrapers/taiwan_monthly.py 抓(每月 10 日)
  # - 台股法說會由 update_all 從 config/taiwan_companies.yaml 動態 inject 進此類別
  # ============================================================
  - name: 企業
    keywords: [法說會, investor day, earnings call, 財報, 投資人會議, 業績發表]
    known_exhibitions: []

  # ============================================================
  # 臺灣專屬(同完整版)
  # ============================================================
  - name: 文具禮品
    taiwan_only: true
    keywords: [文具, 禮品, stationery, gift]
    known_exhibitions:
      - 台北國際文具禮品展 TIGS

  - name: 建材
    taiwan_only: true
    keywords: [建材, 建築, 建築材料]
    known_exhibitions:
      - BUILD TAIWAN 台北國際建築建材暨產品展
      - TaipeiPLAS

  - name: 旅展
    taiwan_only: true
    keywords: [旅展, 觀光, travel, tourism]
    known_exhibitions:
      - ITF 台北國際旅展
      - TTE 台北國際觀光博覽會
