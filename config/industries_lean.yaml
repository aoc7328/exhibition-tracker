# 精簡版 — 給 Claude Pro $20 訂閱用,每月一次可跑完不太撞牆
#
# 包含:
#   1. 臺灣專屬(同完整版):文具/建材/旅展
#   2. 世界各類別大型盛會(每類 1-2 個)
#   3. MAG7 + 重要 AI/科技龍頭年度發表會

industries:
  # ============================================================
  # 世界各類別大型盛會(每類 1-2 個)
  # ============================================================
  - name: 半導體
    keywords: [SEMICON, semiconductor, 半導體, 晶圓]
    known_exhibitions:
      - SEMICON Taiwan
      - SEMICON West

  - name: 顯示與面板
    keywords: [Display, OLED, Micro LED, 顯示器, 面板]
    known_exhibitions:
      - Display Week SID
      - Touch Taiwan

  - name: 通訊與5G
    keywords: [MWC, 5G, 6G, mobile world]
    known_exhibitions:
      - MWC Barcelona

  - name: 衛星與太空
    keywords: [satellite, space, 衛星, 太空]
    known_exhibitions:
      - Satellite Show DC
      - Space Symposium

  - name: 機器人
    keywords: [robotics, humanoid, 機器人]
    known_exhibitions:
      - iREX 國際機器人展
      - 台灣機器人與智慧自動化展

  - name: 國防與無人系統
    keywords: [defense, drone, 國防, 無人機]
    known_exhibitions:
      - Eurosatory
      - 台北國際國防航太暨無人機展

  - name: 車用電子
    keywords: [automotive, EV, 車用電子]
    known_exhibitions:
      - Electronica

  - name: 消費電子綜合
    keywords: [CES, IFA, consumer electronics]
    known_exhibitions:
      - CES Las Vegas
      - IFA Berlin
      # Computex Taipei 已移到「科技盛事」類別(桃紅)

  # ============================================================
  # 科技盛事 — 超大型科技公司發表盛事 / 開發者大會(桃紅標記)
  # 與「企業」(財報/法說會/月營收)刻意區隔:這裡是「產品與技術發表」的旗艦活動。
  # NVIDIA GTC 各地區分開列 —— unique key 是「展名 + 年份」,同年同名只會留一筆,
  # 所以不分開的話 6 月的 GTC Taipei 會被 3 月的 GTC San Jose 蓋掉(比照下方 Code with Claude 三城市拆法)。
  # ============================================================
  # 只留「盛大的年度發表會」頭部清單(刻意精簡以省 API 額度與時間)。
  # 要追更多(Mac event / Pixel / Ignite / Samsung Unpacked / Snapdragon / Code with Claude…)
  # 再往下加即可。
  - name: 科技盛事
    keywords: [keynote, developer conference, launch event, 發表會, WWDC, GTC, I/O]
    known_exhibitions:
      - Apple WWDC
      - Apple iPhone Event September
      - NVIDIA GTC San Jose
      - NVIDIA GTC Taipei
      - Google I/O
      - Computex Taipei
      - Microsoft Build
      - AMD Advancing AI Event
      - Meta Connect
      - AWS re:Invent
      - OpenAI DevDay

  # ============================================================
  # 企業 — 純財務事件(財報 / 法說會 / 月營收 / 投資人會議,紫色標記)
  # 注意:
  # - 美股 quarterly earnings 由 Finnhub API scraper 抓
  # - 台股月營收由 src/scrapers/taiwan_monthly.py 抓(每月 10 日)
  # - 台股法說會由 update_all 從 config/taiwan_companies.yaml 動態 inject 進此類別
  # ============================================================
  - name: 企業
    keywords: [法說會, investor day, earnings call, 財報, 投資人會議, 業績發表]
    known_exhibitions: []

  # ============================================================
  # 臺灣展覽(文具/建材/旅展等)→ 不放這裡,改由 Layer 1 免費爬蟲處理
  # ------------------------------------------------------------
  # 台北世貿(twtc.py)+ 南港展覽館(nangang.py)會直接爬場館官網的展覽分頁(純 HTTP,
  # 不花 API、不需 Puppeteer),再用 config/industries.yaml 的關鍵字
  # (文具/禮品/建材/旅展/觀光…)自動分類。所以這些台灣展不必再花 Perplexity 查。
  # ============================================================
